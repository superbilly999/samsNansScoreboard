{% if games %}
  <ul class="game-list">
    {% for game in games %}
      <li>
        <div>
          <div class="game-name">{{ game.name }}</div>
          <div class="game-meta">
            Round {{ game.current_round_index }}/13
            {% if game.finished %}
              - Finished
            {% endif %}
          </div>
        </div>
        <div class="inline-actions">
          <button
            class="btn ghost"
            hx-get="{{ url_for('game_view', game_id=game.id) }}"
            hx-target="#app"
            hx-swap="innerHTML"
            hx-push-url="true"
          >
            Open
          </button>
          <button
            class="btn danger"
            hx-post="{{ url_for('archive_game', game_id=game.id) }}"
            hx-target="#game-list"
            hx-swap="innerHTML"
          >
            Archive
          </button>
        </div>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p class="muted">No saved games yet. Create one to get started.</p>
{% endif %}
