<div id="score-table" class="panel" {% if oob %}hx-swap-oob="true"{% endif %}>
  <div class="panel-header">
    <h3>Scoreboard</h3>
    <span class="tag">Game averages</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Player</th>
          <th>Avg</th>
          <th>Total</th>
          <th>Rank</th>
        </tr>
      </thead>
      <tbody>
        {% for player in players %}
          {% set avg_score = averages.get(player.id) %}
          <tr
            class="{% if player.id in leader_ids %}leader{% elif player.id in last_ids %}last-place{% endif %}"
          >
            <td>{{ player.name }}</td>
            <td>
              {% if avg_score is not none %}
                {{ avg_score }}
              {% else %}
                -
              {% endif %}
            </td>
            <td>{{ totals[player.id] }}</td>
            <td>#{{ ranks[player.id] }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
